services:
  postgres:
    image: postgres:17-alpine
    container_name: omnilist-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnilist}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - omnilist-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-omnilist}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  omnilist-postgres-data:
